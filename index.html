<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>good food</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Prompt&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header__inner">
        <span class="header__logo">
          <span class="header__logo--primary">good</span>
          <span class="header__logo--secondary">food</span>
        </span>
        <button class="header__btn" aria-label="Settings" disabled>
          <svg width="24" height="24" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true">
            <path d="M232.6,94.2l-20.1-3.4a86.9,86.9,0,0,0-5.4-13.1l11.7-16.4a4,4,0,0,0-.4-5.2l-19.9-19.9a4,4,0,0,0-5.2-.4L176.9,47.5a88.1,88.1,0,0,0-13.1-5.4L160.2,22a4,4,0,0,0-3.9-3.2H99.7A4,4,0,0,0,95.8,22l-3.6,20.1a88.1,88.1,0,0,0-13.1,5.4L62.7,35.8a4,4,0,0,0-5.2.4L37.6,56.1a4,4,0,0,0-.4,5.2L48.9,77.7a86.9,86.9,0,0,0-5.4,13.1L23.4,94.2A4,4,0,0,0,20.2,98v56.6a4,4,0,0,0,3.2,3.9l20.3,3.4a88,88,0,0,0,5.4,12.9L37.2,191a4,4,0,0,0,.4,5.2l19.9,19.9a4,4,0,0,0,5.2.4l16.3-11.6a85.3,85.3,0,0,0,13,5.4l3.5,20.2a4,4,0,0,0,3.9,3.2h56.6a4,4,0,0,0,3.9-3.2l3.5-20.2a85.3,85.3,0,0,0,13-5.4l16.3,11.6a4,4,0,0,0,5.2-.4l19.9-19.9a4,4,0,0,0,.4-5.2l-11.9-16.2a88,88,0,0,0,5.4-12.9l20.3-3.4a4,4,0,0,0,3.2-3.9V98A4,4,0,0,0,232.6,94.2ZM228,151.2l-19.7,3.3a4.1,4.1,0,0,0-3.2,2.9,80.4,80.4,0,0,1-6.5,15.7,4,4,0,0,0,.3,4.3l11.5,15.8-14.6,14.6-15.8-11.2a4,4,0,0,0-4.3-.3,77.8,77.8,0,0,1-15.7,6.4,4.1,4.1,0,0,0-2.9,3.2L154,225.7H102l-3.1-19.8a4.1,4.1,0,0,0-2.9-3.2,77.8,77.8,0,0,1-15.7-6.4,4,4,0,0,0-4.3.3l-15.8,11.2L45.6,193.2l11.5-15.8a4,4,0,0,0,.3-4.3,80.4,80.4,0,0,1-6.5-15.7,4.1,4.1,0,0,0-3.2-2.9L28,151.2V104.8l19.7-3.3A4.1,4.1,0,0,0,50.9,98.6,80.4,80.4,0,0,1,57.4,82.9a4,4,0,0,0-.3-4.3L45.6,62.8,60.2,48.2,76,59.4a4,4,0,0,0,4.3.3,77.8,77.8,0,0,1,15.7-6.4,4.1,4.1,0,0,0,2.9-3.2L102,30.3H154l3.1,19.8a4.1,4.1,0,0,0,2.9,3.2,77.8,77.8,0,0,1,15.7,6.4,4,4,0,0,0,4.3-.3l15.8-11.2,14.6,14.6L199,78.6a4,4,0,0,0-.3,4.3,80.4,80.4,0,0,1,6.5,15.7,4.1,4.1,0,0,0,3.2,2.9L228,104.8ZM128,76a52,52,0,1,0,52,52A52,52,0,0,0,128,76Zm0,96a44,44,0,1,1,44-44A44,44,0,0,1,128,172Z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- DIET CRITERIA -->
    <div class="criteria">
      <button class="criteria__add" aria-label="Add" disabled>
        <svg width="24" height="24" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true">
          <path d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z"/>
        </svg>
      </button>
      <div class="criteria__scroll">
        <button class="chip chip--cycle" id="chip-cycle" data-key="cycle" aria-label="Select cycle phase">
          <span class="chip__label" data-i18n="cycleLabel">Cycle</span>
          <span id="cycle-label">Luteal</span>
          <svg width="16" height="16" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true">
            <path d="M227.3,73.4,182.6,28.7a16,16,0,0,0-22.6,0L36.7,152a15.9,15.9,0,0,0-4.7,11.3V208a16,16,0,0,0,16,16H92.7A15.9,15.9,0,0,0,104,219.3L227.3,96a16,16,0,0,0,0-22.6ZM92.7,208H48V163.3l88-88,44.7,44.7ZM192,108.7,147.3,64,171.3,40,216,84.7Z"/>
          </svg>
        </button>
        <div class="chip" data-key="diet">
          <span data-i18n="inflammatory">Inflammatory</span>
        </div>
      </div>
    </div>

    <!-- LEGEND -->
    <div class="legend">
      <div class="legend__item">
        <svg width="16" height="16" viewBox="0 0 256 256" fill="#d4724a" aria-hidden="true">
          <path d="M120,40V24a8,8,0,0,1,16,0V40a8,8,0,0,1-16,0Zm72,88a64,64,0,1,1-64-64A64.1,64.1,0,0,1,192,128Zm-16,0a48,48,0,1,0-48,48A48,48,0,0,0,176,128ZM58.3,69.7,46.3,57.7A8.1,8.1,0,0,1,57.7,46.3L69.7,58.3A8.1,8.1,0,0,1,58.3,69.7Zm0,116.6A8.1,8.1,0,0,1,69.7,197.7L57.7,209.7A8.1,8.1,0,0,1,46.3,198.3ZM224,120h-16a8,8,0,0,0,0,16h16a8,8,0,0,0,0-16ZM40,120H24a8,8,0,0,0,0,16H40a8,8,0,0,0,0-16ZM197.7,57.7a8.1,8.1,0,0,1,11.4,11.4L197.7,81.1a8.1,8.1,0,0,1-11.4-11.4Zm0,140.6-11.4-11.4a8.1,8.1,0,0,1,11.4-11.4l11.4,11.4A8.1,8.1,0,0,1,197.7,198.3ZM120,216v16a8,8,0,0,0,16,0V216a8,8,0,0,0-16,0Z"/>
        </svg>
        <span class="legend__label" data-i18n="seasonLabel">Season</span>
        <span class="legend__value" id="season-label"></span>
      </div>
      <div class="legend__item">
        <svg width="16" height="16" viewBox="0 0 256 256" fill="#3a8a6e" aria-hidden="true">
          <path d="M128,24A80,80,0,1,0,208,104c0,72-80,128-80,128S48,176,48,104A80,80,0,0,1,128,24Zm0,112a32,32,0,1,0-32-32A32,32,0,0,0,128,136Z"/>
        </svg>
        <span class="legend__label" data-i18n="placeLabel">Place</span>
        <span class="legend__value" id="location-label">Polska</span>
      </div>
    </div>

    <!-- FOOD SECTION -->
    <section class="food-section">
      <div class="food-slider" id="food-slider"></div>
    </section>

    <!-- PAGE: CYCLE SELECTION -->
    <div class="page" id="page-cycle" aria-hidden="true">
      <header class="page__header">
        <h2 class="page__title" data-i18n="cyclePageTitle">Cycle phase</h2>
        <button class="page__close" id="cycle-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 256 256" fill="currentColor">
            <path d="M205.7,194.3a8.1,8.1,0,0,1,0,11.4,8.2,8.2,0,0,1-11.4,0L128,139.3,61.7,205.7a8.2,8.2,0,0,1-11.4,0,8.1,8.1,0,0,1,0-11.4L116.7,128,50.3,61.7A8.1,8.1,0,0,1,61.7,50.3L128,116.7l66.3-66.4a8.1,8.1,0,0,1,11.4,11.4L139.3,128Z"/>
          </svg>
        </button>
      </header>
      <ul class="cycle-options">
        <li><button class="cycle-option" data-value="Menstrual" data-i18n="phases.Menstrual">Menstrual</button></li>
        <li><button class="cycle-option" data-value="Follicular" data-i18n="phases.Follicular">Follicular</button></li>
        <li><button class="cycle-option" data-value="Ovulation" data-i18n="phases.Ovulation">Ovulation</button></li>
        <li><button class="cycle-option" data-value="Luteal" data-i18n="phases.Luteal">Luteal</button></li>
      </ul>
    </div>

  </div>
  <script src="js/i18n.js"></script>
  <script src="data/products.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
