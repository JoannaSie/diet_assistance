<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>good food</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Prompt&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header__inner">
        <span class="header__logo">
          <span class="header__logo--primary">good</span>
          <span class="header__logo--secondary">food</span>
        </span>
        <button class="header__btn" aria-label="Settings" disabled>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 15C12.7956 15 13.5587 14.6839 14.1213 14.1213C14.6839 13.5587 15 12.7956 15 12C15 11.2044 14.6839 10.4413 14.1213 9.87868C13.5587 9.31607 12.7956 9 12 9C11.2044 9 10.4413 9.31607 9.87868 9.87868C9.31607 10.4413 9 11.2044 9 12C9 12.7956 9.31607 13.5587 9.87868 14.1213C10.4413 14.6839 11.2044 15 12 15Z"/>
            <path d="M19.622 10.395L18.525 7.745L20 6L18 4L16.265 5.483L13.558 4.37L12.935 2H10.981L10.349 4.401L7.704 5.516L6 4L4 6L5.453 7.789L4.373 10.446L2 11V13L4.401 13.656L5.516 16.3L4 18L6 20L7.791 18.54L10.397 19.612L11 22H13L13.604 19.613L16.255 18.515C16.697 18.832 18 20 18 20L20 18L18.516 16.25L19.614 13.598L22 12.978V11L19.622 10.395Z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- DIET CRITERIA -->
    <div class="criteria">
      <button class="criteria__add" id="btn-add-diet" aria-label="Add diet filter" disabled>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 12H12M12 12H18M12 12V6M12 12V18"/>
        </svg>
      </button>
      <div class="criteria__scroll">
        <button class="chip chip--cycle" id="chip-cycle" data-key="cycle" aria-label="Select cycle phase">
          <span class="chip__label" data-i18n="cycleLabel">Cycle</span>
          <span id="cycle-label">Luteal</span>
          <svg width="16" height="16" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true">
            <path d="M227.3,73.4,182.6,28.7a16,16,0,0,0-22.6,0L36.7,152a15.9,15.9,0,0,0-4.7,11.3V208a16,16,0,0,0,16,16H92.7A15.9,15.9,0,0,0,104,219.3L227.3,96a16,16,0,0,0,0-22.6ZM92.7,208H48V163.3l88-88,44.7,44.7ZM192,108.7,147.3,64,171.3,40,216,84.7Z"/>
          </svg>
        </button>
        <!-- Diet chips rendered dynamically -->
        <div id="diet-chips"></div>
      </div>
    </div>

    <!-- LEGEND -->
    <div class="legend">
      <div class="legend__item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d4724a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 12H23M12 2V1M12 23V22M20 20L19 19M20 4L19 5M4 20L5 19M4 4L5 5M1 12H2M12 18C13.5913 18 15.1174 17.3679 16.2426 16.2426C17.3679 15.1174 18 13.5913 18 12C18 10.4087 17.3679 8.88258 16.2426 7.75736C15.1174 6.63214 13.5913 6 12 6C10.4087 6 8.88258 6.63214 7.75736 7.75736C6.63214 8.88258 6 10.4087 6 12C6 13.5913 6.63214 15.1174 7.75736 16.2426C8.88258 17.3679 10.4087 18 12 18Z"/>
        </svg>
        <span class="legend__label" data-i18n="seasonLabel">Season</span>
        <span class="legend__value" id="season-label"></span>
      </div>
      <div class="legend__item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3a8a6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 10C20 14.418 12 22 12 22C12 22 4 14.418 4 10C4 7.87827 4.84285 5.84344 6.34315 4.34315C7.84344 2.84285 9.87827 2 12 2C14.1217 2 16.1566 2.84285 17.6569 4.34315C19.1571 5.84344 20 7.87827 20 10Z"/>
          <path d="M12 11C12.2652 11 12.5196 10.8946 12.7071 10.7071C12.8946 10.5196 13 10.2652 13 10C13 9.73478 12.8946 9.48043 12.7071 9.29289C12.5196 9.10536 12.2652 9 12 9C11.7348 9 11.4804 9.10536 11.2929 9.29289C11.1054 9.48043 11 9.73478 11 10C11 10.2652 11.1054 10.5196 11.2929 10.7071C11.4804 10.8946 11.7348 11 12 11Z" fill="#3a8a6e" stroke="#3a8a6e"/>
        </svg>
        <span class="legend__label" data-i18n="placeLabel">Place</span>
        <span class="legend__value" id="location-label">Poland</span>
      </div>
    </div>

    <!-- FOOD SECTION -->
    <section class="food-section">
      <div class="food-slider" id="food-slider"></div>
    </section>

    <!-- PAGE: CYCLE SELECTION -->
    <div class="page" id="page-cycle" aria-hidden="true">
      <header class="page__header">
        <h2 class="page__title" data-i18n="cyclePageTitle">Cycle phase</h2>
        <button class="page__close" id="cycle-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 256 256" fill="currentColor">
            <path d="M205.7,194.3a8.1,8.1,0,0,1,0,11.4,8.2,8.2,0,0,1-11.4,0L128,139.3,61.7,205.7a8.2,8.2,0,0,1-11.4,0,8.1,8.1,0,0,1,0-11.4L116.7,128,50.3,61.7A8.1,8.1,0,0,1,61.7,50.3L128,116.7l66.3-66.4a8.1,8.1,0,0,1,11.4,11.4L139.3,128Z"/>
          </svg>
        </button>
      </header>
      <ul class="cycle-options">
        <li><button class="cycle-option" data-value="Menstrual" data-i18n="phases.Menstrual">Menstrual</button></li>
        <li><button class="cycle-option" data-value="Follicular" data-i18n="phases.Follicular">Follicular</button></li>
        <li><button class="cycle-option" data-value="Ovulation" data-i18n="phases.Ovulation">Ovulation</button></li>
        <li><button class="cycle-option" data-value="Luteal" data-i18n="phases.Luteal">Luteal</button></li>
      </ul>
    </div>

    <!-- PAGE: DIET SELECTION (multiselect) -->
    <div class="page" id="page-diet" aria-hidden="true">
      <header class="page__header">
        <h2 class="page__title" data-i18n="dietPageTitle">Diet filters</h2>
        <button class="page__close" id="diet-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 256 256" fill="currentColor">
            <path d="M205.7,194.3a8.1,8.1,0,0,1,0,11.4,8.2,8.2,0,0,1-11.4,0L128,139.3,61.7,205.7a8.2,8.2,0,0,1-11.4,0,8.1,8.1,0,0,1,0-11.4L116.7,128,50.3,61.7A8.1,8.1,0,0,1,61.7,50.3L128,116.7l66.3-66.4a8.1,8.1,0,0,1,11.4,11.4L139.3,128Z"/>
          </svg>
        </button>
      </header>
      <ul class="diet-options">
        <li>
          <button class="diet-option" data-value="anti_inflammatory">
            <span data-i18n="dietAntiInflammatory">Anti-inflammatory</span>
            <svg class="diet-option__check" width="20" height="20" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true">
              <path d="M229.7,77.7l-128,128a8.2,8.2,0,0,1-11.4,0l-56-56A8.1,8.1,0,0,1,45.7,138.3L96,188.7,218.3,66.3a8.1,8.1,0,0,1,11.4,11.4Z"/>
            </svg>
          </button>
        </li>
      </ul>
    </div>

  </div>
  <script src="js/i18n.js"></script>
  <script src="data/products.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
